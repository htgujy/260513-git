<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>총 게임-vs code(두번째-깃허브)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap');
        
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #050505; color: white; }
        canvas { display: block; }

        /* UI Containers */
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* Screens */
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: auto;
        }
        .hidden-screen { opacity: 0; pointer-events: none; transform: scale(1.1); }

        /* Main Menu */
        #main-menu {
            background: radial-gradient(circle at 20% 50%, rgba(0,0,0,0.8) 0%, transparent 100%);
            justify-content: center; padding-left: 8%;
        }

        /* Hero Selection */
        #hero-menu {
            background: rgba(0, 0, 0, 0.9);
            justify-content: center; align-items: center;
        }

        #game-logo {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 5rem;
            line-height: 1; margin-bottom: 2rem; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .menu-btn {
            font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #ccc;
            margin: 10px 0; cursor: pointer; transition: all 0.2s;
            position: relative; padding-left: 0; text-transform: uppercase; letter-spacing: 2px;
        }
        .menu-btn:hover { color: #fff; padding-left: 20px; text-shadow: 0 0 10px #0ff; }

        /* Hero Cards */
        .hero-grid { display: flex; gap: 20px; margin-top: 30px; }
        .hero-card {
            width: 220px; height: 350px; background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .hero-card:hover { transform: translateY(-15px); border-color: #0ff; background: rgba(0, 255, 255, 0.1); }
        .hero-card.selected { border-color: #0ff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); background: rgba(0, 255, 255, 0.15); }
        
        .hero-name { font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1.5rem; margin-top: 15px; }
        .hero-stat { font-size: 0.8rem; color: #aaa; margin-top: 5px; }

        /* HUD */
        #hud {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            display: none; justify-content: space-between; align-items: flex-end;
            padding: 0 50px 30px 50px;
        }
        .hud-visible { display: flex !important; }

        .health-container {
            width: 300px; background: rgba(0, 0, 0, 0.5);
            border-left: 8px solid #fff; padding: 10px; transform: skewX(-15deg);
        }
        #health-bar { height: 20px; background: #fff; width: 100%; transition: width 0.3s; }

        .ult-container {
            position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%);
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.6); border: 4px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #ult-progress {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: #0ff; opacity: 0.5; transition: height 0.3s;
        }
        #ult-icon { z-index: 2; font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #0ff; }

        #theme-toggle {
            position: absolute; top: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto; z-index: 100;
        }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; display: none; }
        #hit-marker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4444; font-size: 2.5rem; opacity: 0; pointer-events: none; }
        #kill-feed { position: absolute; top: 80px; right: 20px; display: flex; flex-direction: column; gap: 5px; }
        .kill-item { background: rgba(0, 0, 0, 0.7); color: white; padding: 5px 15px; border-right: 4px solid #0ff; animation: slideIn 0.3s forwards; font-size: 0.8rem; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div id="loading-screen">LOADING SYSTEM...</div>

    <div id="ui-container">
        <!-- Theme Toggle -->
        <div id="theme-toggle" onclick="toggleTheme(event)">
            <svg id="theme-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2">
                <path id="icon-path" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen">
            <div id="game-logo">NEON<br>STRIKE</div>
            <div class="flex flex-col">
                <div class="menu-btn" onclick="startGame()">▶ Play</div>
                <div class="menu-btn" onclick="showHeroMenu()">👤 Heroes</div>
                <div class="menu-btn" onclick="showSoon()">Settings</div>
            </div>
        </div>

        <!-- Hero Selection Menu -->
        <div id="hero-menu" class="screen hidden-screen">
            <h2 class="font-['Orbitron'] text-4xl mb-8">SELECT YOUR HERO</h2>
            <div class="hero-grid">
                <div class="hero-card" onclick="selectHero('neon')" id="card-neon">
                    <div class="w-20 h-20 bg-cyan-400 rounded-full shadow-[0_0_20px_rgba(34,211,238,0.5)]"></div>
                    <div class="hero-name">NEON</div>
                    <div class="hero-stat">HP: 200 | SPD: FAST</div>
                    <div class="hero-stat italic text-cyan-400">"Light speed strike."</div>
                </div>
                <div class="hero-card" onclick="selectHero('titan')" id="card-titan">
                    <div class="w-20 h-20 bg-orange-500 rounded-full shadow-[0_0_20px_rgba(249,115,22,0.5)]"></div>
                    <div class="hero-name">TITAN</div>
                    <div class="hero-stat">HP: 400 | SPD: SLOW</div>
                    <div class="hero-stat italic text-orange-400">"Immovable object."</div>
                </div>
                <div class="hero-card" onclick="selectHero('wind')" id="card-wind">
                    <div class="w-20 h-20 bg-lime-400 rounded-full shadow-[0_0_20px_rgba(163,230,53,0.5)]"></div>
                    <div class="hero-name">WIND</div>
                    <div class="hero-stat">HP: 150 | SPD: BREEZE</div>
                    <div class="hero-stat italic text-lime-400">"Catch me if you can."</div>
                </div>
            </div>
            <div class="menu-btn mt-12" onclick="backToMain()">↩ Back</div>
        </div>

        <!-- In-Game HUD -->
        <div id="hud">
            <div class="health-container">
                <div id="hero-tag" class="text-[10px] font-bold text-cyan-400 uppercase tracking-tighter mb-1">HERO: NEON</div>
                <div id="health-text" class="text-white text-[10px] font-bold mb-1">HP 200 / 200</div>
                <div id="health-bar"></div>
            </div>
            <div class="ult-container">
                <div id="ult-progress"></div>
                <div id="ult-icon">Q</div>
            </div>
            <div class="flex gap-4 transform skewX(-15deg)">
                <div class="w-16 h-16 bg-black/60 border-2 border-white flex items-center justify-center text-[10px]">SHIFT</div>
            </div>
        </div>

        <div id="crosshair">
            <svg viewBox="0 0 100 100" class="w-full h-full stroke-cyan-400 stroke-[5] fill-none">
                <circle cx="50" cy="50" r="8" /><line x1="50" y1="20" x2="50" y2="35" /><line x1="50" y1="65" x2="50" y2="80" /><line x1="20" y1="50" x2="35" y2="50" /><line x1="65" y1="50" x2="80" y2="50" />
            </svg>
        </div>

        <div id="hit-marker">╳</div>
        <div id="kill-feed"></div>

        <!-- Defeated Screen -->
        <div id="game-over" class="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center hidden">
            <h2 class="font-['Orbitron'] text-6xl text-red-500 mb-8 tracking-tighter">DEFEATED</h2>
            <div class="menu-btn" onclick="resetGame()">Try Again</div>
            <div class="menu-btn" onclick="location.reload()">Main Menu</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let isGameActive = false;
        let isDarkTheme = true;
        let heroModel, floor, grid;
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity, direction, raycaster;
        
        let enemies = [];
        let health = 200, maxHealth = 200;
        let ultCharge = 0;

        const heroes = {
            neon: { name: 'NEON', hp: 200, color: 0x00ffff, speed: 50, dash: 60 },
            titan: { name: 'TITAN', hp: 400, color: 0xffa500, speed: 30, dash: 30 },
            wind: { name: 'WIND', hp: 150, color: 0xccff00, speed: 75, dash: 90 }
        };
        let currentHero = heroes.neon;

        function init() {
            if (typeof THREE === 'undefined') return;

            velocity = new THREE.Vector3();
            direction = new THREE.Vector3();
            raycaster = new THREE.Raycaster();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 2, 8);
            camera.lookAt(0, 1.5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(hemiLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(5, 10, 7.5);
            scene.add(sunLight);

            grid = new THREE.GridHelper(200, 50, 0x00ffff, 0x111111);
            scene.add(grid);

            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const heroGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
            const heroMat = new THREE.MeshPhongMaterial({ color: currentHero.color, emissive: currentHero.color, emissiveIntensity: 0.5 });
            heroModel = new THREE.Mesh(heroGeo, heroMat);
            heroModel.position.set(0, 1, 0);
            scene.add(heroModel);

            setupControls();
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onShoot);
            
            document.getElementById('loading-screen').style.display = 'none';
            selectHero('neon'); // Default
            animate();
        }

        function showHeroMenu() {
            document.getElementById('main-menu').classList.add('hidden-screen');
            document.getElementById('hero-menu').classList.remove('hidden-screen');
        }

        function backToMain() {
            document.getElementById('hero-menu').classList.add('hidden-screen');
            document.getElementById('main-menu').classList.remove('hidden-screen');
        }

        function selectHero(id) {
            currentHero = heroes[id];
            maxHealth = currentHero.hp;
            health = maxHealth;
            
            // UI Update
            document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');
            
            // Model Update
            if(heroModel) {
                heroModel.material.color.setHex(currentHero.color);
                heroModel.material.emissive.setHex(currentHero.color);
            }

            // HUD Tag
            document.getElementById('hero-tag').innerText = `HERO: ${currentHero.name}`;
            document.getElementById('hero-tag').style.color = `#${currentHero.color.toString(16).padStart(6, '0')}`;
            updateHUD();
        }

        function startGame() {
            if (!camera) return;
            isGameActive = true;
            document.getElementById('main-menu').classList.add('hidden-screen');
            document.getElementById('hero-menu').classList.add('hidden-screen');
            document.getElementById('hud').classList.add('hud-visible');
            document.getElementById('crosshair').style.display = 'block';
            
            camera.position.set(0, 1.7, 5);
            camera.rotation.set(0, 0, 0);
            if (heroModel) scene.remove(heroModel);
            document.body.requestPointerLock();
        }

        function onShoot() {
            if (!isGameActive || document.pointerLockElement !== document.body) return;
            
            const marker = document.getElementById('hit-marker');
            raycaster.setFromCamera({x: 0, y: 0}, camera);
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                marker.style.opacity = '1';
                setTimeout(() => marker.style.opacity = '0', 100);
                
                target.hp -= 50;
                if (target.hp <= 0) killEnemy(target);
                
                ultCharge = Math.min(100, ultCharge + 10);
                updateHUD();
            }
        }

        function spawnEnemy() {
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
            const enemy = new THREE.Mesh(geo, mat);
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 10;
            enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
            enemy.hp = 100;
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        function killEnemy(enemy) {
            const index = enemies.indexOf(enemy);
            if (index > -1) {
                scene.remove(enemy);
                enemies.splice(index, 1);
                const feed = document.getElementById('kill-feed');
                const item = document.createElement('div');
                item.className = 'kill-item';
                item.innerText = `${currentHero.name} ELIMINATED TARGET +100`;
                feed.appendChild(item);
                setTimeout(() => item.remove(), 3000);
            }
        }

        function handlePlayerDeath() {
            isGameActive = false;
            document.exitPointerLock();
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('hud').classList.remove('hud-visible');
            document.getElementById('crosshair').style.display = 'none';
        }

        function resetGame() {
            health = maxHealth;
            ultCharge = 0;
            isGameActive = true;
            enemies.forEach(e => scene.remove(e));
            enemies = [];
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('hud').classList.add('hud-visible');
            document.getElementById('crosshair').style.display = 'block';
            camera.position.set(0, 1.7, 5);
            updateHUD();
            document.body.requestPointerLock();
        }

        function useDash() {
            if (!isGameActive) return;
            velocity.z += currentHero.dash;
        }

        function useUltimate() {
            if (ultCharge < 100) return;
            ultCharge = 0;
            updateHUD();
            [...enemies].forEach(t => killEnemy(t));
        }

        function updateHUD() {
            document.getElementById('health-bar').style.width = `${(health / maxHealth) * 100}%`;
            document.getElementById('health-text').innerText = `HP ${Math.ceil(health)} / ${maxHealth}`;
            document.getElementById('ult-progress').style.height = `${ultCharge}%`;
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': useDash(); break;
                    case 'KeyQ': useUltimate(); break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body && camera) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }
            });
        }

        function toggleTheme(e) {
            e.stopPropagation();
            isDarkTheme = !isDarkTheme;
            const iconPath = document.getElementById('icon-path');
            if (isDarkTheme) {
                scene.background.setHex(0x050505);
                scene.fog.color.setHex(0x050505);
                iconPath.setAttribute('d', 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z');
            } else {
                scene.background.setHex(0x87ceeb);
                scene.fog.color.setHex(0x87ceeb);
                iconPath.setAttribute('d', 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z');
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function showSoon() {
            const feed = document.getElementById('kill-feed');
            const item = document.createElement('div');
            item.className = 'kill-item';
            item.innerText = 'NOT AVAILABLE IN DEMO';
            feed.appendChild(item);
            setTimeout(() => item.remove(), 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (isGameActive) {
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * currentHero.speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * currentHero.speed * delta;

                camera.translateX(-velocity.x * delta);
                camera.translateZ(velocity.z * delta);
                camera.position.y = 1.7;
                velocity.multiplyScalar(0.9);

                enemies.forEach(enemy => {
                    const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    enemy.position.add(dir.multiplyScalar(delta * 4));
                    enemy.lookAt(camera.position);
                    if (enemy.position.distanceTo(camera.position) < 1.5) {
                        health -= 25 * delta;
                        updateHUD();
                        if (health <= 0) handlePlayerDeath();
                    }
                });

                if (Math.random() < 0.01 && enemies.length < 10) spawnEnemy();
            } else {
                // Menu Rotation
                if (heroModel) {
                    const time = Date.now() * 0.0005;
                    camera.position.x = Math.cos(time) * 7;
                    camera.position.z = Math.sin(time) * 7;
                    camera.lookAt(0, 1.5, 0);
                    heroModel.rotation.y += 0.01;
                }
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
