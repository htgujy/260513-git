<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Hero FPS - Overwatch Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 가장 안정적인 unpkg CDN 사용 -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap');
        
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #050505; color: white; }
        canvas { display: block; }

        /* UI Containers */
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* Main Menu */
        #main-menu {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex; flex-direction: column; justify-content: center;
            padding-left: 8%; pointer-events: auto; transition: opacity 0.5s ease;
        }
        .menu-hidden { opacity: 0; pointer-events: none; }

        #game-logo {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 5rem;
            line-height: 1; margin-bottom: 2rem; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .menu-btn {
            font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #ccc;
            margin: 10px 0; cursor: pointer; transition: all 0.2s;
            position: relative; padding-left: 0; text-transform: uppercase; letter-spacing: 2px;
        }
        .menu-btn:hover { color: #fff; padding-left: 20px; text-shadow: 0 0 10px #0ff; }

        /* HUD */
        #hud {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            display: none; justify-content: space-between; align-items: flex-end;
            padding: 0 50px 30px 50px;
        }
        .hud-visible { display: flex !important; }

        .health-container {
            width: 300px; background: rgba(0, 0, 0, 0.5);
            border-left: 8px solid #fff; padding: 10px; transform: skewX(-15deg);
        }
        #health-bar { height: 20px; background: #fff; width: 100%; transition: width 0.3s; }

        .ult-container {
            position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%);
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.6); border: 4px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #ult-progress {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: #0ff; opacity: 0.5; transition: height 0.3s;
        }
        #ult-icon { z-index: 2; font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #0ff; }

        #theme-toggle {
            position: absolute; top: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto; z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 30px; height: 30px; display: none;
        }

        #hit-marker {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4444; font-size: 2.5rem; opacity: 0; pointer-events: none; transition: opacity 0.1s;
        }

        #kill-feed { position: absolute; top: 80px; right: 20px; display: flex; flex-direction: column; gap: 5px; }
        .kill-item {
            background: rgba(0, 0, 0, 0.7); color: white; padding: 5px 15px;
            border-right: 4px solid #0ff; animation: slideIn 0.3s forwards;
            font-weight: bold; font-size: 0.8rem;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 1000; font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div id="loading-screen">LOADING ASSETS...</div>

    <div id="ui-container">
        <div id="theme-toggle" onclick="toggleTheme(event)">
            <svg id="theme-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2">
                <path id="icon-path" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </div>

        <div id="main-menu" class="menu-hidden">
            <div id="game-logo">NEON<br>STRIKE</div>
            <div class="flex flex-col">
                <div class="menu-btn" onclick="startGame()">▶ Play</div>
                <div class="menu-btn" onclick="showSoon()">Heroes</div>
                <div class="menu-btn" onclick="showSoon()">Settings</div>
            </div>
            <div class="absolute bottom-10 left-10 text-white/30 text-xs font-bold uppercase tracking-widest">
                Overwatch Style Demo v1.5 - Stability Fix
            </div>
        </div>

        <div id="hud">
            <div class="health-container">
                <div id="health-text" class="text-white text-[10px] font-bold mb-1">HP 200 / 200</div>
                <div id="health-bar"></div>
            </div>
            <div class="ult-container">
                <div id="ult-progress"></div>
                <div id="ult-icon">Q</div>
            </div>
            <div class="flex gap-4 transform skewX(-15deg)">
                <div class="w-16 h-16 bg-black/60 border-2 border-white flex items-center justify-center text-[10px]">SHIFT</div>
            </div>
        </div>

        <div id="crosshair">
            <svg viewBox="0 0 100 100" class="w-full h-full stroke-cyan-400 stroke-[5] fill-none">
                <circle cx="50" cy="50" r="8" />
                <line x1="50" y1="20" x2="50" y2="35" />
                <line x1="50" y1="65" x2="50" y2="80" />
                <line x1="20" y1="50" x2="35" y2="50" />
                <line x1="65" y1="50" x2="80" y2="50" />
            </svg>
        </div>

        <div id="hit-marker">╳</div>
        <div id="kill-feed"></div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let isGameActive = false;
        let isDarkTheme = true;
        let heroModel, floor, grid;
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity, direction, raycaster;
        
        let enemies = [];
        let health = 200, maxHealth = 200;
        let ultCharge = 0;

        function init() {
            // 라이브러리 로드 체크
            if (typeof THREE === 'undefined') {
                console.error('THREE.js failed to load. Check your internet connection.');
                document.getElementById('loading-screen').innerText = "ERROR: FAILED TO LOAD LIBRARIES";
                return;
            }

            // 객체 생성 지연 처리
            velocity = new THREE.Vector3();
            direction = new THREE.Vector3();
            raycaster = new THREE.Raycaster();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 2, 8);
            camera.lookAt(0, 1.5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lights
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(hemiLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(5, 10, 7.5);
            scene.add(sunLight);

            // Environment
            grid = new THREE.GridHelper(200, 50, 0x00ffff, 0x111111);
            scene.add(grid);

            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Menu Hero Preview
            const heroGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
            const heroMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x003333 });
            heroModel = new THREE.Mesh(heroGeo, heroMat);
            heroModel.position.set(0, 1, 0);
            scene.add(heroModel);

            setupControls();
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onShoot);
            
            // 로딩 화면 제거 및 메뉴 표시
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').classList.remove('menu-hidden');
            
            animate();
        }

        function startGame() {
            // 카메라가 초기화되지 않았으면 실행 방지
            if (!camera) {
                console.error("Camera not initialized!");
                return;
            }

            isGameActive = true;
            document.getElementById('main-menu').classList.add('menu-hidden');
            document.getElementById('hud').classList.add('hud-visible');
            document.getElementById('crosshair').style.display = 'block';
            
            camera.position.set(0, 1.7, 5);
            camera.rotation.set(0, 0, 0);
            
            if (heroModel) scene.remove(heroModel);
            document.body.requestPointerLock();
        }

        function toggleTheme(e) {
            if(e) e.stopPropagation();
            if(!scene) return;

            isDarkTheme = !isDarkTheme;
            const iconPath = document.getElementById('icon-path');
            
            if (isDarkTheme) {
                scene.background = new THREE.Color(0x050505);
                scene.fog.color = new THREE.Color(0x050505);
                iconPath.setAttribute('d', 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z');
            } else {
                scene.background = new THREE.Color(0x87ceeb);
                scene.fog.color = new THREE.Color(0x87ceeb);
                iconPath.setAttribute('d', 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z');
            }
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': useDash(); break;
                    case 'KeyQ': useUltimate(); break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body && camera) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }
            });
        }

        function onShoot() {
            if (!isGameActive || document.pointerLockElement !== document.body || !camera) return;
            
            const marker = document.getElementById('hit-marker');
            raycaster.setFromCamera({x: 0, y: 0}, camera);
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                marker.style.opacity = '1';
                setTimeout(() => marker.style.opacity = '0', 100);
                
                target.hp -= 50;
                if (target.hp <= 0) killEnemy(target);
                
                ultCharge = Math.min(100, ultCharge + 10);
                updateHUD();
            }
        }

        function spawnEnemy() {
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
            const enemy = new THREE.Mesh(geo, mat);
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 10;
            enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
            enemy.hp = 100;
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        function killEnemy(enemy) {
            const index = enemies.indexOf(enemy);
            if (index > -1) {
                scene.remove(enemy);
                enemies.splice(index, 1);
                
                const feed = document.getElementById('kill-feed');
                const item = document.createElement('div');
                item.className = 'kill-item';
                item.innerText = 'TARGET ELIMINATED +100';
                feed.appendChild(item);
                setTimeout(() => item.remove(), 3000);
            }
        }

        function useDash() {
            if (!isGameActive || !velocity) return;
            velocity.z += 60;
        }

        function useUltimate() {
            if (ultCharge < 100) return;
            ultCharge = 0;
            updateHUD();
            [...enemies].forEach(t => killEnemy(t));
        }

        function updateHUD() {
            document.getElementById('health-bar').style.width = `${(health / maxHealth) * 100}%`;
            document.getElementById('health-text').innerText = `HP ${Math.ceil(health)} / ${maxHealth}`;
            document.getElementById('ult-progress').style.height = `${ultCharge}%`;
        }

        function onWindowResize() {
            if(!camera) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function showSoon() {
            const feed = document.getElementById('kill-feed');
            const item = document.createElement('div');
            item.className = 'kill-item';
            item.innerText = 'FEATURE COMING SOON';
            feed.appendChild(item);
            setTimeout(() => item.remove(), 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!clock || !renderer || !scene || !camera) return;

            const delta = clock.getDelta();

            if (isGameActive) {
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 50.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 50.0 * delta;

                camera.translateX(-velocity.x * delta);
                camera.translateZ(velocity.z * delta);
                camera.position.y = 1.7;

                velocity.multiplyScalar(0.9);

                // Enemy AI
                enemies.forEach(enemy => {
                    const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    enemy.position.add(dir.multiplyScalar(delta * 4));
                    enemy.lookAt(camera.position);
                    
                    if (enemy.position.distanceTo(camera.position) < 1.5) {
                        health -= 15 * delta;
                        updateHUD();
                        if (health <= 0) location.reload();
                    }
                });

                if (Math.random() < 0.01 && enemies.length < 10) spawnEnemy();
            } else {
                // Menu Background Rotation
                if (heroModel) {
                    const time = Date.now() * 0.0005;
                    camera.position.x = Math.cos(time) * 7;
                    camera.position.z = Math.sin(time) * 7;
                    camera.lookAt(0, 1.5, 0);
                    heroModel.rotation.y += 0.01;
                }
            }

            renderer.render(scene, camera);
        }

        // 윈도우 로드 시 실행
        window.onload = init;
    </script>
</body>
</html>
