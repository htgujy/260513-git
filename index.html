<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Range: Neon Strike</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 255, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 255, 0.7);
        }
        #crosshair::before { top: 50%; left: -5px; width: 30px; height: 2px; transform: translateY(-50%); }
        #crosshair::after { left: 50%; top: -5px; height: 30px; width: 2px; transform: translateX(-50%); }
        
        .game-ui {
            position: absolute;
            color: #fff;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            pointer-events: none;
            user-select: none;
        }

        #ult-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            z-index: 10;
        }
        #ult-progress {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#ffcc00 0%, transparent 0%);
            transition: background 0.1s;
        }
        #hit-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ff4444;
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
            z-index: 6;
        }
        .kill-feed {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #fff;
            max-height: 200px;
            overflow: hidden;
        }
        .ability-slot {
            position: absolute;
            bottom: 40px;
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #0ff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 150px; /* Kill feed와 겹치지 않게 조절 */
            z-index: 70;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
        }
        #theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }
        #theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <button id="theme-toggle" title="Toggle Brightness">
        <svg id="theme-icon-sun" class="hidden text-yellow-400" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="theme-icon-moon" class="text-indigo-300" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <div id="crosshair"></div>
    <div id="hit-marker">╳</div>
    
    <div class="game-ui top-5 left-5">
        <div class="text-xs uppercase opacity-70 font-bold mb-1">Combatant Health</div>
        <div class="w-64 h-4 bg-gray-800 rounded-full border border-white/20 overflow-hidden">
            <div id="health-bar" class="h-full bg-cyan-400 transition-all duration-300" style="width: 100%"></div>
        </div>
        <div class="flex items-baseline gap-2 mt-1">
            <span id="health" class="text-4xl font-black italic">200</span>
            <span class="text-sm opacity-50">/ 200</span>
        </div>
        <div class="mt-4 text-cyan-400 font-bold">SCORE: <span id="score-val">0</span></div>
    </div>

    <div class="kill-feed" id="kill-feed"></div>

    <div id="ult-container" class="flex items-center justify-center">
        <div id="ult-progress"></div>
        <div id="ult-inner" class="absolute inset-1 bg-black/80 rounded-full flex flex-col items-center justify-center border-2 border-white/10">
            <span id="ult-text" class="text-2xl font-black text-white">0%</span>
        </div>
        <div class="absolute -bottom-8 text-[10px] font-bold text-yellow-400 uppercase tracking-[0.2em]">Ultimate [Q]</div>
    </div>

    <div class="ability-slot" style="right: 20%;">
        <span class="text-[10px] text-cyan-300 font-bold">DASH</span>
        <span class="text-xl font-black text-white">SHIFT</span>
        <div id="dash-cooldown" class="absolute inset-0 bg-black/80 flex items-center justify-center opacity-0 transition-opacity rounded-lg">
            <span class="text-white font-bold text-lg">0s</span>
        </div>
    </div>

    <div id="instructions" class="absolute inset-0 flex flex-col items-center justify-center bg-black/95 text-white z-50 cursor-pointer">
        <h1 class="text-8xl font-black italic mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">NEON STRIKE</h1>
        <p class="text-2xl mb-12 animate-pulse text-cyan-300 font-light tracking-widest">CLICK TO INITIALIZE COMBAT</p>
        <div class="grid grid-cols-3 gap-8 text-center border-t border-white/10 pt-8">
            <div>
                <div class="text-cyan-400 text-xs mb-2">MOVE</div>
                <div class="text-xl font-bold">WASD</div>
            </div>
            <div>
                <div class="text-cyan-400 text-xs mb-2">DASH</div>
                <div class="text-xl font-bold">L-SHIFT</div>
            </div>
            <div>
                <div class="text-yellow-400 text-xs mb-2">ULTIMATE</div>
                <div class="text-xl font-bold">Q</div>
            </div>
        </div>
    </div>

    <div id="game-over" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-red-950/95 text-white z-[60]">
        <h2 class="text-8xl font-black mb-4 italic">MISSION FAILED</h2>
        <p id="final-score" class="text-3xl mb-12 font-light tracking-widest"></p>
        <button onclick="location.reload()" class="px-12 py-4 bg-white text-red-900 font-black rounded-full hover:bg-cyan-400 transition-all hover:scale-110">RESTART SYSTEM</button>
    </div>
</div>

<script>
let scene, camera, renderer, clock;
let isDarkMode = true;
let ambientLight;
let velocity = new THREE.Vector3(); // Missing velocity variable
let direction = new THREE.Vector3();
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false; // Missing movement states
let enemies = [];
let enemyProjectiles = [];
let score = 0;
let health = 200;
let maxHealth = 200;
let ultCharge = 0;
let isUltActive = false;
let dashCooldown = 0;
let isGameActive = false;
let spawnTimer = 0;

function init() {
    scene = new THREE.Scene();
    updateThemeStyles(); // 초기 테마 설정

    camera = new THREE.Camera();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.y = 1.7; // Player height
    camera.rotation.order = 'YXZ';

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // Lighting
    ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0x00ffff, 1, 100);
    mainLight.position.set(0, 10, 0);
    scene.add(mainLight);

    // Floor
    const gridHelper = new THREE.GridHelper(200, 50, 0x00ffff, 0x002222);
    scene.add(gridHelper);

    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshPhongMaterial({ color: 0x050505 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    setupControls();
    window.addEventListener('resize', onWindowResize);
    document.addEventListener('mousedown', onMouseDown);
    
    document.getElementById('theme-toggle').addEventListener('click', (e) => {
        e.stopPropagation(); // 포인터 락 방해 금지
        toggleTheme();
    });
}

function toggleTheme() {
    isDarkMode = !isDarkMode;
    updateThemeStyles();
    
    // UI 아이콘 토글
    const sunIcon = document.getElementById('theme-icon-sun');
    const moonIcon = document.getElementById('theme-icon-moon');
    const btn = document.getElementById('theme-toggle');

    if (isDarkMode) {
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
        btn.style.background = "rgba(0, 0, 0, 0.4)";
    } else {
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
        btn.style.background = "rgba(255, 255, 255, 0.8)";
    }
}

function updateThemeStyles() {
    if (!scene) return;

    if (isDarkMode) {
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.015);
        if (ambientLight) ambientLight.intensity = 0.5;
    } else {
        // 라이트 모드: 밝은 하늘색 배경과 강한 조명
        scene.background = new THREE.Color(0xd0e7ff);
        scene.fog = new THREE.FogExp2(0xd0e7ff, 0.01);
        if (ambientLight) ambientLight.intensity = 1.5;
    }
}

function setupControls() {
    const instructions = document.getElementById('instructions');

    instructions.addEventListener('click', () => {
        document.body.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === document.body) {
            isGameActive = true;
            instructions.style.display = 'none';
        } else {
            isGameActive = false;
            if (health > 0) instructions.style.display = 'flex';
        }
    });

    const onKeyDown = (event) => {
        if (!isGameActive) return;
        switch (event.code) {
            case 'KeyW': moveForward = true; break;
            case 'KeyS': moveBackward = true; break;
            case 'KeyA': moveLeft = true; break;
            case 'KeyD': moveRight = true; break;
            case 'ShiftLeft': useDash(); break;
            case 'KeyQ': useUltimate(); break;
        }
    };

    const onKeyUp = (event) => {
        switch (event.code) {
            case 'KeyW': moveForward = false; break;
            case 'KeyS': moveBackward = false; break;
            case 'KeyA': moveLeft = false; break;
            case 'KeyD': moveRight = false; break;
        }
    };

    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    document.addEventListener('mousemove', (event) => {
        if (!isGameActive) return;
        const movementX = event.movementX || 0;
        const movementY = event.movementY || 0;

        camera.rotation.y -= movementX * 0.002;
        camera.rotation.x -= movementY * 0.002;
        camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
    });
}

function useDash() {
    if (dashCooldown > 0) return;
    
    const dashVector = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    dashVector.y = 0;
    dashVector.normalize().multiplyScalar(40);
    velocity.add(dashVector);
    
    dashCooldown = 5;
}

function useUltimate() {
    if (ultCharge < 100 || isUltActive) return;
    
    isUltActive = true;
    ultCharge = 0;
    
    document.getElementById('ult-inner').classList.add('bg-yellow-500/60');
    document.getElementById('crosshair').style.borderColor = "#ffcc00";
    
    setTimeout(() => {
        isUltActive = false;
        document.getElementById('ult-inner').classList.remove('bg-yellow-500/60');
        document.getElementById('crosshair').style.borderColor = "rgba(0, 255, 255, 0.7)";
    }, 8000);
}

function onMouseDown() {
    if (!isGameActive) return;

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera({ x: 0, y: 0 }, camera);
    const intersects = raycaster.intersectObjects(enemies);

    if (intersects.length > 0) {
        hitEnemy(intersects[0].object);
    }
}

function hitEnemy(target) {
    const hitMarker = document.getElementById('hit-marker');
    hitMarker.style.opacity = "1";
    setTimeout(() => hitMarker.style.opacity = "0", 100);

    if (!isUltActive) {
        ultCharge = Math.min(100, ultCharge + 10);
    }

    removeEnemy(target);
    score += 100;
    document.getElementById('score-val').innerText = score;
    
    const feed = document.getElementById('kill-feed');
    const log = document.createElement('div');
    log.className = "text-sm font-bold text-white mb-1";
    log.innerHTML = `<span class="text-blue-400">YOU</span> ⚔️ <span class="text-red-500">BOT_${Math.floor(Math.random()*999)}</span>`;
    feed.prepend(log);
    setTimeout(() => log.remove(), 3000);
}

function spawnEnemy() {
    const geo = new THREE.BoxGeometry(1, 2, 1);
    const mat = new THREE.MeshPhongMaterial({ 
        color: 0xff0055, 
        emissive: 0x330011,
        shininess: 100 
    });
    const enemy = new THREE.Mesh(geo, mat);
    
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 20;
    enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
    
    scene.add(enemy);
    enemies.push(enemy);
}

function removeEnemy(enemy) {
    scene.remove(enemy);
    enemies = enemies.filter(e => e !== enemy);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if (isGameActive) {
        // Movement
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

        camera.translateX(-velocity.x * delta);
        camera.translateZ(velocity.z * delta);
        camera.position.y = 1.7; // Keep on ground

        // UI Updates
        if (dashCooldown > 0) {
            dashCooldown -= delta;
            document.getElementById('dash-cooldown').style.opacity = "1";
            document.getElementById('dash-cooldown').querySelector('span').innerText = Math.max(0, Math.ceil(dashCooldown)) + "s";
        } else {
            document.getElementById('dash-cooldown').style.opacity = "0";
        }

        document.getElementById('ult-text').innerText = isUltActive ? "ACTIVE" : Math.floor(ultCharge) + "%";
        document.getElementById('ult-progress').style.background = `conic-gradient(#ffcc00 ${ultCharge}%, transparent 0%)`;

        // Ultimate Auto-Aim
        if (isUltActive && enemies.length > 0) {
            let closest = null;
            let minDist = Infinity;
            enemies.forEach(e => {
                const d = e.position.distanceTo(camera.position);
                if (d < minDist) { minDist = d; closest = e; }
            });
            if (closest) {
                const targetPos = closest.position.clone();
                camera.lookAt(targetPos);
            }
        }

        // Enemy AI & Spawning
        spawnTimer += delta;
        if (spawnTimer > 2) {
            spawnEnemy();
            spawnTimer = 0;
        }

        enemies.forEach(enemy => {
            const dir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
            enemy.position.add(dir.multiplyScalar(delta * 3));
            
            // Player hit check
            if (enemy.position.distanceTo(camera.position) < 1.5) {
                health -= delta * 50;
                if (health <= 0) gameOver();
            }
        });

        const hpBar = document.getElementById('health-bar');
        hpBar.style.width = (health / maxHealth * 100) + "%";
        document.getElementById('health').innerText = Math.max(0, Math.floor(health));
    }

    renderer.render(scene, camera);
}

function gameOver() {
    isGameActive = false;
    document.exitPointerLock();
    document.getElementById('game-over').classList.remove('hidden');
    document.getElementById('final-score').innerText = `SYSTEM SCORE: ${score}`;
}

window.onload = () => {
    init();
    animate();
};
</script>
</body>
</html>
